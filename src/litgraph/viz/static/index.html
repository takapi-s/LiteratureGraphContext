<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LiteratureGraph</title>
  <script src="https://unpkg.com/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; }
    header { padding: 12px 16px; border-bottom: 1px solid #334155; display: flex; gap: 12px; align-items: center; }
    #cy { width: 100vw; height: calc(100vh - 52px); }
    input { background: #1e293b; border: 1px solid #475569; color: #e2e8f0; padding: 6px 10px; border-radius: 6px; min-width: 220px; }
    #info { font-size: 13px; color: #94a3b8; }
  </style>
</head>
<body>
  <header>
    <strong>LiteratureGraph</strong>
    <input id="filter" placeholder="Filter nodes..." />
    <span id="info"></span>
  </header>
  <div id="cy"></div>
  <script>
    const colors = {
      Paper: '#38bdf8', Method: '#a78bfa', Task: '#34d399', Dataset: '#fbbf24',
      Claim: '#f472b6', Limitation: '#fb7185', Contribution: '#60a5fa', Author: '#94a3b8',
      Venue: '#cbd5e1', Metric: '#f59e0b', Evidence: '#64748b',
    };

    async function load() {
      const res = await fetch('/api/graph');
      const data = await res.json();
      const elements = [];
      for (const n of data.nodes || []) {
        const label = n.type || 'Node';
        const id = n.id;
        const name = n.title || n.name || n.text || id;
        elements.push({
          data: { id, label: `${label}: ${String(name).slice(0, 40)}`, type: label, raw: n },
        });
      }
      for (const e of data.edges || []) {
        elements.push({ data: { id: `${e.source}-${e.type}-${e.target}`, source: e.source, target: e.target, label: e.type } });
      }
      document.getElementById('info').textContent =
        `${(data.nodes || []).length} nodes, ${(data.edges || []).length} edges`;
      const cy = cytoscape({
        container: document.getElementById('cy'),
        elements,
        style: [
          { selector: 'node', style: {
            'label': 'data(label)', 'font-size': 10, 'color': '#e2e8f0', 'text-wrap': 'wrap',
            'text-max-width': 120, 'background-color': ele => colors[ele.data('type')] || '#64748b',
            'width': 28, 'height': 28,
          }},
          { selector: 'edge', style: {
            'width': 1.5, 'line-color': '#475569', 'target-arrow-color': '#475569',
            'target-arrow-shape': 'triangle', 'curve-style': 'bezier', 'font-size': 8, 'color': '#94a3b8',
            'label': 'data(label)',
          }},
        ],
        layout: { name: 'cose', animate: false, padding: 30 },
      });
      document.getElementById('filter').addEventListener('input', (ev) => {
        const q = ev.target.value.toLowerCase();
        cy.nodes().forEach(n => n.style('display', !q || n.data('label').toLowerCase().includes(q) ? 'element' : 'none'));
      });
    }
    load();
  </script>
</body>
</html>
