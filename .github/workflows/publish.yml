# Publish literature-graph to PyPI via Trusted Publishing (OIDC).
#
# One-time setup on https://pypi.org/manage/account/publishing/:
#   PyPI Project Name: literature-graph
#   Owner: takapi-s
#   Repository name: LiteratureGraphContext
#   Workflow name: publish.yml
#   Environment name: (leave blank — this workflow does not use a GitHub Environment)
#
# Then: merge to main, tag, and publish a GitHub Release:
#   git tag v1.0.0 && git push origin v1.0.0

name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build sdist and wheel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
