<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IDEA Matrix (Impact x Difficulty)</title>
    <style>
      :root {
        --bg: #ffffff;
        --fg: #111827;
        --muted: #6b7280;
        --grid: #9ca3af;
        --border: #111827;
        --shadow: 0 10px 25px rgba(0,0,0,.08);
        --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji",
          "Segoe UI Emoji";
      }
      html, body { height: 100%; }
      body { margin: 0; font-family: var(--font); background: #f8fafc; color: var(--fg); }
      .wrap { display: grid; grid-template-columns: 1fr 360px; gap: 16px; padding: 16px; }
      .card { background: var(--bg); border: 1px solid #e5e7eb; border-radius: 12px; box-shadow: var(--shadow); }
      .card h1 { font-size: 18px; margin: 0; padding: 14px 16px; border-bottom: 1px solid #e5e7eb; }
      .card .body { padding: 12px 16px; }
      .hint { color: var(--muted); font-size: 12px; line-height: 1.4; }
      .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
      button, input[type="file"] {
        font: inherit;
      }
      button {
        border: 1px solid #d1d5db;
        background: #fff;
        padding: 8px 10px;
        border-radius: 10px;
        cursor: pointer;
      }
      button:hover { background: #f9fafb; }
      button.primary { border-color: #111827; }
      .list {
        max-height: calc(100vh - 160px);
        overflow: auto;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
      }
      .item {
        display: grid;
        grid-template-columns: 52px 1fr;
        gap: 10px;
        padding: 10px 12px;
        border-bottom: 1px solid #f3f4f6;
        cursor: pointer;
      }
      .item:last-child { border-bottom: none; }
      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 24px;
        min-width: 40px;
        padding: 0 8px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        color: white;
      }
      .badge.green { background: #16a34a; }
      .badge.amber { background: #ca8a04; }
      .badge.red { background: #e11d48; }
      .badge.blue { background: #0284c7; }
      .badge.purple { background: #7c3aed; }
      .badge.pink { background: #db2777; }
      .badge.gray { background: #6b7280; }
      .item .name { font-size: 13px; }
      .item .meta { font-size: 11px; color: var(--muted); margin-top: 2px; }

      /* Plot */
      #plotWrap { padding: 14px; }
      #plot {
        width: 100%;
        height: calc(100vh - 80px);
        max-height: 760px;
        min-height: 520px;
        border-radius: 12px;
        background: #fff;
        border: 1px solid #e5e7eb;
        touch-action: none;
      }
      .legendBox { fill: #fff; stroke: #d1d5db; }
      .axis { fill: #111827; font-size: 14px; }
      .axisMuted { fill: #6b7280; font-size: 12px; }
      .cellBorder { stroke: var(--border); stroke-width: 2; fill: none; }
      .sep { stroke: var(--grid); stroke-width: 2; }
      .dotText { font-size: 10px; fill: #fff; font-weight: 700; user-select: none; pointer-events: none; }
      .dot { cursor: grab; }
      .dot:active { cursor: grabbing; }
      .selectedRing { fill: none; stroke: #111827; stroke-width: 2; }
      .editor label { display: block; font-size: 12px; color: var(--muted); margin-top: 10px; }
      .editor input, .editor textarea, .editor select {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        padding: 8px 10px;
        font: inherit;
        font-size: 13px;
      }
      .editor textarea { min-height: 90px; resize: vertical; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>IDEA Matrix (Impact × Difficulty)</h1>
        <div id="plotWrap">
          <svg id="plot" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" aria-label="IDEA matrix plot">
            <!-- axes / grid -->
            <rect x="0" y="0" width="1200" height="800" fill="#ffffff" />
            <text x="600" y="40" text-anchor="middle" font-size="22" font-weight="800" fill="#111827">
              IDEA (Impact × Difficulty)
            </text>
            <rect x="80" y="90" width="1080" height="620" class="cellBorder" />
            <line x1="440" y1="90" x2="440" y2="710" class="sep" />
            <line x1="800" y1="90" x2="800" y2="710" class="sep" />
            <line x1="80" y1="296.6667" x2="1160" y2="296.6667" class="sep" />
            <line x1="80" y1="503.3333" x2="1160" y2="503.3333" class="sep" />

            <text x="260" y="82" text-anchor="middle" class="axis" font-weight="800">Low</text>
            <text x="620" y="82" text-anchor="middle" class="axis" font-weight="800">Medium</text>
            <text x="980" y="82" text-anchor="middle" class="axis" font-weight="800">High</text>
            <text x="50" y="190" text-anchor="end" class="axis" font-weight="800">High</text>
            <text x="50" y="396" text-anchor="end" class="axis" font-weight="800">Medium</text>
            <text x="50" y="610" text-anchor="end" class="axis" font-weight="800">Low</text>
            <text x="675" y="770" text-anchor="middle" class="axis">Difficulty → (Low / Medium / High)</text>
            <text x="28" y="420" text-anchor="middle" class="axis" transform="rotate(-90 28 420)">
              Impact ↑ (Low / Medium / High)
            </text>

            <!-- dots container -->
            <g id="dots"></g>

            <!-- legend -->
            <g id="legend"></g>
          </svg>
        </div>
      </div>

      <div class="card">
        <h1>Ideas</h1>
        <div class="body">
          <div class="row">
            <button class="primary" id="downloadBtn" title="Download current ideas as JSON">Download JSON</button>
            <button id="copyBtn" title="Copy current ideas JSON to clipboard">Copy JSON</button>
            <input id="fileInput" type="file" accept="application/json" />
          </div>
          <p class="hint">
            - Drag dots to re-position.<br />
            - Click a dot or an item to edit its label/details.<br />
            - Coordinates are stored as the dot’s absolute x/y in the plot viewBox (0..1200, 0..800).
          </p>

          <div class="list" id="list"></div>

          <div class="editor" id="editor" style="margin-top: 12px; display: none;">
            <h2 style="font-size: 14px; margin: 12px 0 0;">Edit</h2>
            <label for="editId">ID</label>
            <input id="editId" disabled />
            <label for="editName">Name</label>
            <input id="editName" />
            <label for="editNotes">Notes</label>
            <textarea id="editNotes"></textarea>
            <label for="editColor">Color</label>
            <select id="editColor">
              <option value="green">green</option>
              <option value="amber">amber</option>
              <option value="red">red</option>
              <option value="blue">blue</option>
              <option value="purple">purple</option>
              <option value="pink">pink</option>
              <option value="gray">gray</option>
            </select>
            <div class="row" style="margin-top: 10px;">
              <button id="deleteBtn" title="Delete this idea">Delete</button>
              <button id="addBtn" title="Add a new idea">Add new</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      /**
       * Data model:
       * { id, name, notes, color, x, y }
       */
      const DEFAULT_IDEAS = [
        { id: "I01", name: "Auto-generate paper_id_map from paper_registry", notes: "", color: "green", x: 130, y: 135 },
        { id: "I02", name: "Prompt: keep concrete methods (GCN/GAT/GRU)", notes: "", color: "green", x: 130, y: 165 },
        { id: "I03", name: "Lightweight multilingual synonyms (JP/EN)", notes: "", color: "amber", x: 490, y: 135 },
        { id: "I04", name: "Improve PDF section detection", notes: "", color: "amber", x: 520, y: 135 },
        { id: "I05", name: "MCP watch (ops for new papers)", notes: "", color: "amber", x: 550, y: 135 },
        { id: "I06", name: "Add method roles (used/baseline/mentioned)", notes: "", color: "red", x: 850, y: 135 },
        { id: "I07", name: "Hybrid search (embeddings + keywords + graph)", notes: "", color: "red", x: 880, y: 135 },
        { id: "I08", name: "Team sharing (shared DB, multi-user)", notes: "", color: "red", x: 910, y: 135 },
        { id: "I09", name: "Graph UI: paper-centric sidebar", notes: "", color: "blue", x: 130, y: 345 },
        { id: "I10", name: "Improve MCP/CLI errors (ID resolution hints)", notes: "", color: "blue", x: 160, y: 345 },
        { id: "I11", name: "Extract subsections (4.1/4.2 hierarchy)", notes: "", color: "purple", x: 490, y: 345 },
        { id: "I12", name: "Method hierarchy (IS_A): tiny seed / query expansion", notes: "", color: "purple", x: 520, y: 345 },
        { id: "I13", name: "Improve CITES (merge refs + bib better)", notes: "", color: "pink", x: 850, y: 365 },
        { id: "I14", name: "Docs & tutorials", notes: "", color: "gray", x: 130, y: 555 },
        { id: "I15", name: "PyPI release polish", notes: "", color: "gray", x: 490, y: 555 },
        { id: "I16", name: "New inputs (Web/CSV/Code/Slides/Notebooks)", notes: "", color: "gray", x: 850, y: 555 },
      ];

      const COLOR = {
        green: { fill: "#16A34A", stroke: "#14532D" },
        amber: { fill: "#CA8A04", stroke: "#78350F" },
        red: { fill: "#E11D48", stroke: "#881337" },
        blue: { fill: "#0284C7", stroke: "#0C4A6E" },
        purple: { fill: "#7C3AED", stroke: "#4C1D95" },
        pink: { fill: "#DB2777", stroke: "#831843" },
        gray: { fill: "#6B7280", stroke: "#111827" },
      };

      /** @type {{ideas: any[], selectedId: string|null}} */
      const state = {
        ideas: structuredClone(DEFAULT_IDEAS),
        selectedId: null,
      };

      const $plot = document.getElementById("plot");
      const $dots = document.getElementById("dots");
      const $legend = document.getElementById("legend");
      const $list = document.getElementById("list");
      const $editor = document.getElementById("editor");
      const $editId = document.getElementById("editId");
      const $editName = document.getElementById("editName");
      const $editNotes = document.getElementById("editNotes");
      const $editColor = document.getElementById("editColor");
      const $deleteBtn = document.getElementById("deleteBtn");
      const $addBtn = document.getElementById("addBtn");
      const $downloadBtn = document.getElementById("downloadBtn");
      const $copyBtn = document.getElementById("copyBtn");
      const $fileInput = document.getElementById("fileInput");

      function clamp(n, min, max) { return Math.max(min, Math.min(max, n)); }

      function nextId() {
        const used = new Set(state.ideas.map(i => i.id));
        for (let k = 1; k < 999; k++) {
          const id = "I" + String(k).padStart(2, "0");
          if (!used.has(id)) return id;
        }
        return "I" + String(Date.now());
      }

      function select(id) {
        state.selectedId = id;
        render();
      }

      function selectedIdea() {
        return state.ideas.find(i => i.id === state.selectedId) || null;
      }

      function svgPointFromEvent(evt) {
        const pt = $plot.createSVGPoint();
        pt.x = evt.clientX;
        pt.y = evt.clientY;
        const ctm = $plot.getScreenCTM();
        if (!ctm) return { x: 0, y: 0 };
        const sp = pt.matrixTransform(ctm.inverse());
        return { x: sp.x, y: sp.y };
      }

      function renderLegend() {
        // Minimal legend: just a title. Full mapping is in the list on the right.
        while ($legend.firstChild) $legend.removeChild($legend.firstChild);
        const box = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        box.setAttribute("x", "820");
        box.setAttribute("y", "600");
        box.setAttribute("width", "340");
        box.setAttribute("height", "100");
        box.setAttribute("rx", "10");
        box.setAttribute("class", "legendBox");
        $legend.appendChild(box);

        const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
        t.setAttribute("x", "835");
        t.setAttribute("y", "625");
        t.setAttribute("font-size", "12");
        t.setAttribute("font-weight", "800");
        t.setAttribute("fill", "#111827");
        t.textContent = "Legend";
        $legend.appendChild(t);

        const t2 = document.createElementNS("http://www.w3.org/2000/svg", "text");
        t2.setAttribute("x", "835");
        t2.setAttribute("y", "645");
        t2.setAttribute("font-size", "11");
        t2.setAttribute("fill", "#6b7280");
        t2.textContent = "Click an item on the right to see details.";
        $legend.appendChild(t2);
      }

      function renderDots() {
        while ($dots.firstChild) $dots.removeChild($dots.firstChild);

        for (const idea of state.ideas) {
          const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
          g.setAttribute("data-id", idea.id);

          const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          const c = COLOR[idea.color] || COLOR.gray;
          circle.setAttribute("cx", String(idea.x));
          circle.setAttribute("cy", String(idea.y));
          circle.setAttribute("r", "11");
          circle.setAttribute("fill", c.fill);
          circle.setAttribute("stroke", c.stroke);
          circle.setAttribute("class", "dot");
          circle.addEventListener("pointerdown", (e) => startDrag(e, idea.id));
          circle.addEventListener("click", () => select(idea.id));
          g.appendChild(circle);

          if (state.selectedId === idea.id) {
            const ring = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            ring.setAttribute("cx", String(idea.x));
            ring.setAttribute("cy", String(idea.y));
            ring.setAttribute("r", "16");
            ring.setAttribute("class", "selectedRing");
            g.appendChild(ring);
          }

          const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
          text.setAttribute("x", String(idea.x));
          text.setAttribute("y", String(idea.y + 3));
          text.setAttribute("text-anchor", "middle");
          text.setAttribute("class", "dotText");
          text.textContent = idea.id;
          g.appendChild(text);

          $dots.appendChild(g);
        }
      }

      function renderList() {
        $list.innerHTML = "";
        const ideasSorted = [...state.ideas].sort((a, b) => a.id.localeCompare(b.id));
        for (const idea of ideasSorted) {
          const div = document.createElement("div");
          div.className = "item";
          div.addEventListener("click", () => select(idea.id));

          const badge = document.createElement("div");
          badge.className = "badge " + (idea.color || "gray");
          badge.textContent = idea.id;
          div.appendChild(badge);

          const right = document.createElement("div");
          const name = document.createElement("div");
          name.className = "name";
          name.textContent = idea.name || "(unnamed)";
          right.appendChild(name);

          const meta = document.createElement("div");
          meta.className = "meta";
          meta.textContent = `x=${Math.round(idea.x)}, y=${Math.round(idea.y)} • color=${idea.color}`;
          right.appendChild(meta);
          div.appendChild(right);

          if (state.selectedId === idea.id) {
            div.style.background = "#f9fafb";
          }

          $list.appendChild(div);
        }
      }

      function renderEditor() {
        const idea = selectedIdea();
        if (!idea) {
          $editor.style.display = "none";
          return;
        }
        $editor.style.display = "block";
        $editId.value = idea.id;
        $editName.value = idea.name || "";
        $editNotes.value = idea.notes || "";
        $editColor.value = idea.color || "gray";
      }

      function render() {
        renderLegend();
        renderDots();
        renderList();
        renderEditor();
      }

      // Dragging
      let draggingId = null;
      function startDrag(evt, id) {
        evt.preventDefault();
        draggingId = id;
        select(id);
        evt.currentTarget.setPointerCapture(evt.pointerId);
        $plot.addEventListener("pointermove", onDragMove);
        $plot.addEventListener("pointerup", endDrag, { once: true });
        $plot.addEventListener("pointercancel", endDrag, { once: true });
      }
      function onDragMove(evt) {
        if (!draggingId) return;
        const idea = state.ideas.find(i => i.id === draggingId);
        if (!idea) return;
        const p = svgPointFromEvent(evt);
        idea.x = clamp(p.x, 90, 1150);
        idea.y = clamp(p.y, 110, 690);
        renderDots();
        renderList();
      }
      function endDrag() {
        draggingId = null;
        $plot.removeEventListener("pointermove", onDragMove);
      }

      // Editor bindings
      $editName.addEventListener("input", () => {
        const idea = selectedIdea(); if (!idea) return;
        idea.name = $editName.value;
        renderList();
      });
      $editNotes.addEventListener("input", () => {
        const idea = selectedIdea(); if (!idea) return;
        idea.notes = $editNotes.value;
      });
      $editColor.addEventListener("change", () => {
        const idea = selectedIdea(); if (!idea) return;
        idea.color = $editColor.value;
        render();
      });

      $deleteBtn.addEventListener("click", () => {
        const idea = selectedIdea(); if (!idea) return;
        state.ideas = state.ideas.filter(i => i.id !== idea.id);
        state.selectedId = null;
        render();
      });

      $addBtn.addEventListener("click", () => {
        const id = nextId();
        state.ideas.push({ id, name: "New idea", notes: "", color: "gray", x: 620, y: 400 });
        select(id);
      });

      function downloadJson() {
        const payload = JSON.stringify({ ideas: state.ideas }, null, 2);
        const blob = new Blob([payload], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "idea_matrix.json";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }

      $downloadBtn.addEventListener("click", downloadJson);
      $copyBtn.addEventListener("click", async () => {
        const payload = JSON.stringify({ ideas: state.ideas }, null, 2);
        try {
          await navigator.clipboard.writeText(payload);
          $copyBtn.textContent = "Copied!";
          setTimeout(() => ($copyBtn.textContent = "Copy JSON"), 900);
        } catch {
          alert("Clipboard write failed. Use Download JSON instead.");
        }
      });

      $fileInput.addEventListener("change", async () => {
        const file = $fileInput.files && $fileInput.files[0];
        if (!file) return;
        try {
          const text = await file.text();
          const data = JSON.parse(text);
          if (!data || !Array.isArray(data.ideas)) throw new Error("Invalid JSON: expected { ideas: [...] }");
          // minimal validation
          state.ideas = data.ideas
            .filter(x => x && typeof x.id === "string")
            .map(x => ({
              id: String(x.id),
              name: String(x.name || ""),
              notes: String(x.notes || ""),
              color: String(x.color || "gray"),
              x: Number.isFinite(x.x) ? x.x : 620,
              y: Number.isFinite(x.y) ? x.y : 400,
            }));
          state.selectedId = null;
          render();
        } catch (e) {
          alert(String(e));
        } finally {
          $fileInput.value = "";
        }
      });

      // Init
      render();
      select("I01");
    </script>
  </body>
</html>
